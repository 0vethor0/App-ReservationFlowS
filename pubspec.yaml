name: beam_reserve
description: "BeamFlow - Gestión y reservación de proyectores"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^6.0.1
  provider: ^6.1.4
  intl: ^0.20.2
  animate_do: ^5.1.0
  google_fonts: ^8.1.0
  cached_network_image: ^3.4.1
  font_awesome_flutter: ^10.12.0
  shimmer: ^3.0.0
  google_sign_in: ^7.2.0
  url_launcher: ^6.3.1
  go_router: ^17.2.3
  table_calendar: ^3.2.0
  image_picker: ^1.2.2
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  modal_bottom_sheet: ^3.0.0
  syncfusion_flutter_calendar: ^33.2.4
  flutter_launcher_icons: ^0.14.4
  fluttertoast: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/icon/

