# Este archivo configura el analizador estático de Dart.

# 1. Importa las reglas estándar recomendadas por el equipo de Flutter
include: package:flutter_lints/flutter.yaml

analyzer:
  # 2. Excluye archivos generados automáticamente para que no den errores falsos
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"

  # 3. Configura la severidad de ciertos problemas
  errors:
    todo: ignore
    missing_required_param: error    # Un parámetro requerido que falta será un error de compilación
    missing_return: error            # Olvidar un return en una función será un error
    unused_local_variable: warning   # Variables sin usar se marcan como aviso
    dead_code: error                # El código que nunca se ejecutará es un error

# 4. Reglas personalizadas del Linter (Estilo y bugs comunes)
linter:
  rules:
    # --- BUENAS PRÁCTICAS Y PREVENCIÓN DE ERRORES ---
    - always_declare_return_types       # Te obliga a decir qué devuelve una función (ej: void, int)
    - cancel_subscriptions              # Evita fugas de memoria cerrando Streams
    - close_sinks                       # Evita fugas de memoria cerrando Sinks
    - prefer_final_locals               # Si una variable no cambia, oblígala a ser final (optimiza memoria)
    - avoid_print                       # Evita dejar prints en el código que subes a producción
    - avoid_empty_else                  # Evita bloques else vacíos que ensucian el código
    - no_duplicate_case_values          # Evita duplicados en los bloques switch (error lógico común)
    - prefer_const_constructors         # Mejora el rendimiento usando const donde sea posible
    - prefer_is_not_empty               # Obliga a usar !isEmpty en lugar de length > 0
    - annotate_overrides                # Obliga a usar @override para no sobrescribir métodos por error